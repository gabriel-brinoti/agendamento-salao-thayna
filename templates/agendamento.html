<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Edu+NSW+ACT+Cursive:wght@400..700&family=Momo+Signature&family=Playwrite+DK+Uloopet+Guides&family=Roboto:ital,wght@0,100..900;1,100..900&family=Titillium+Web:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700&display=swap" rel="stylesheet">
    <title>Agendamento</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Agendar Horário</h1>
        {% if erro %}
            <p class="erro">{{ erro }}</p>
        {% endif %}

        <form method="POST">
            <label>Nome:</label>
            <input type="text" name="nome" required>

            <label>Sobrenome:</label>
            <input type="text" name="sobrenome" required>

            <label>Telefone:</label>
            <input type="tel" name="telefone" required placeholder="(99) 99999-9999">

            <label>Serviço:</label>
            <select name="servico" required>
    <option value="">Selecione</option>

     <option value="Designer">
        Designer - R$ 40,00
    </option>

    <option value="Maquiagem completa">
        Maquiagem completa - R$ 130,00 
    </option>

    <option value="Depilação de rosto">
        Depilação de rosto - R$ 30,00
    </option>

    <option value="Depilação de buço">
        Depilação de buço - R$ 10,00
    </option>

    <option value="Designer com Henna">
        Designer com Henna - R$ 50,00
    </option>

    <option value="Pacote semanal">
        Pacote semanal - R$ 140,00
    </option>

    <option value="Pacote semanal com Henna">
        Pacote semanal com Henna - R$ 180,00
    </option>

    <option value="Maquiagem sem cílios postiços">
        Maquiagem sem cílios postiços - R$ 110,00
    </option>

</select>

            <label>Data:</label>
            <input type="date" name="data" required>

            <label>Horário:</label>
            <select name="horario" id="horario" required>
                <option value="">Selecione um horário</option>
            </select>

            <label>Observações:</label>
            <textarea name="obs" placeholder="Ex: queixas atuais"></textarea>

            <button type="submit">Confirmar agendamento</button>
        </form>
    </div>
    <script>
const campoData = document.querySelector("input[name='data']");
const selectHorario = document.getElementById("horario");

function carregarHorarios() {
    const data = campoData.value;

    selectHorario.innerHTML = '<option value="">Selecione um horário</option>';

    if (!data) {
        return;
    }

    fetch(`/horarios?data=${data}`)
        .then(response => response.json())
        .then(horarios => {
            selectHorario.innerHTML = '<option value="">Selecione um horário</option>';

            if (horarios.length === 0) {
                selectHorario.innerHTML += '<option value="">Sem horários disponíveis</option>';
                return;
            }

            horarios.forEach(h => {
                selectHorario.innerHTML += `<option value="${h}">${h}</option>`;
            });
        });
}

campoData.addEventListener("change", carregarHorarios);
window.addEventListener("pageshow", carregarHorarios);
</script>
</body>
</html>
